{% extends "layout.html" %}

{% block title %}{{ '編輯' if contact else '新增' }}聯絡人{% endblock %}

{% block content %}
<div class="container">
    <h2>{{ '編輯' if contact else '新增' }}聯絡人</h2>
    <form id="contactForm" onsubmit="handleSubmit(event)">
        <input type="hidden" id="contactId" value="{{ contact.id if contact else '' }}">

        <div class="form-group">
            <label for="name">姓名 *</label>
            <input type="text" id="name" required value="{{ contact.name if contact else '' }}">
        </div>

        <div class="form-group">
            <label for="phone">電話</label>
            <input type="text" id="phone" value="{{ contact.phone if contact else '' }}">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" value="{{ contact.email if contact else '' }}">
        </div>

        <div class="form-group">
            <label for="company">公司</label>
            <input type="text" id="company" value="{{ contact.company if contact else '' }}">
        </div>

        <div class="form-group">
            <label for="notes">備註</label>
            <textarea id="notes" rows="3">{{ contact.notes if contact else '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ '更新' if contact else '儲存' }}</button>
            <a href="/" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
